    priority: high
    acceptance_criteria:
      - Отображаются минимум 3 карточки тарифов
      - Каждая карточка содержит название, цену и список возможностей
      - Рекомендуемый тариф визуально выделен
      - Карточки адаптивны под мобильные устройства
    depends_on:
      - task-002
    related_feature: Лендинг с тарифами
    status: completed
    summary: >-
      Добавлен блок тарифов на главную страницу. Реализованы 3 карточки:

      «Месячный» (499 ₽), «Годовой» (299 ₽, рекомендуемый) и «Премиум» (899 ₽).

      Годовой тариф выделен purple-градиентной обводкой, glow-эффектом,

      бейджем «Выбор пользователей» и масштабированием. Каждая карточка

      содержит: название, цену (со скидкой для месячного), список

      возможностей с цветными иконками Check, CTA-кнопку. Неоновая рамка

      при наведении на нерекомендуемые тарифы. Адаптивная сетка

      (1 колонка на мобильных, 3 на десктопе).

      Основная реализация: components/pricing-section.tsx, lib/data.ts,
      app/page.tsx.
