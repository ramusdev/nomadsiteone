  - id: task-005
    phase: mvp
    title: Переключить тему на тёмную по умолчанию
    description: Сайт сейчас отображается в светлой теме, хотя по задумке должен
      быть тёмный фон с неоновыми акцентами в стиле киберпанк. Нужно сделать
      тёмную тему основной по умолчанию.
    priority: high
    acceptance_criteria:
      - Фон сайта тёмный, а не светлый
      - Все элементы (карточки, текст, кнопки) корректно отображаются на тёмном
        фоне
      - Неоновые акценты (синий, фиолетовый, зелёный) хорошо видны
    depends_on: []
    related_feature: Лендинг с тарифами
    status: completed
    summary: Тёмная тема включена по умолчанию. В app/layout.tsx добавлен
      ThemeProvider из next-themes с параметрами attribute="class"
      defaultTheme="dark" enableSystem={false}. На <html> установлен класс
      "dark" и suppressHydrationWarning для предотвращения flash светлой темы до
      гидратации. Все CSS-переменные тёмной темы (.dark) уже были определены в
      globals.css и теперь активируются по умолчанию. Неоновые акценты (primary,
      chart-1..5) видны на тёмном фоне.
