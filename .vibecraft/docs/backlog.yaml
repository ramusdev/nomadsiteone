tasks:
  - id: task-001
    phase: mvp
    title: Визуальная заглушка главной страницы
    description: |-
      Создать главную страницу VPN-сервиса со статическими данными-заглушками.
      Цель: дать пользователю первый визуальный результат как можно быстрее.
      Реализовать hero-секцию с названием сервиса, слоганом и CTA-кнопкой.
    priority: high
    acceptance_criteria:
      - Главная страница отображается без ошибок
      - Hero-секция с названием, слоганом и кнопкой видна сразу
    depends_on: []
    related_feature: Лендинг с тарифами
    status: completed
    summary: >-
      Реализована hero-секция VPN-сервиса «NeonVPN» в стиле киберпанк/неон.

      На странице отображаются: название сервиса с градиентной подсветкой,
      слоган,

      описание и CTA-кнопка «Подключиться» с иконкой.

      Основная реализация: components/hero-section.tsx, lib/data.ts,
      app/page.tsx.
  - id: task-002
    phase: mvp
    title: Блок преимуществ сервиса
    description:
      Добавить на главную страницу блок с 3-4 ключевыми преимуществами
      VPN-сервиса (скорость, безопасность, отсутствие логов, количество
      серверов) с иконками в стиле киберпанк.
    priority: high
    acceptance_criteria:
      - Блок преимуществ отображается с 3-4 характеристиками
      - Каждая характеристика имеет иконку и описание
      - Блок стилизован под киберпанк/неон
    depends_on:
      - task-001
    related_feature: Лендинг с тарифами
    status: completed
    summary: |-
      Добавлен блок преимуществ на главную страницу. Реализованы 4 карточки:
      «Молниеносная скорость» (Zap), «Военная безопасность» (ShieldCheck),
      «Строгая политика без логов» (EyeOff), «87 серверов в 40 странах» (Globe).
      Каждая карточка имеет неоновую обводку при наведении, градиентную иконку
      с glow-эффектом и анимацию появления. Основная реализация:
      components/benefits-section.tsx, lib/data.ts, app/page.tsx.
  - id: task-003
    phase: mvp
    title: Блок тарифов с карточками
    description: "Добавить блок тарифов с тремя карточками: месячный, годовой и
      премиум. Каждая карточка содержит название, цену и список возможностей.
